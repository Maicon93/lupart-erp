services:
  postgres:
    image: postgres:16
    container_name: lupart-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: "1"
      POSTGRES_DB: lupart
    ports:
      - "5430:5432"
    volumes:
      - lupart_pgdata:/var/lib/postgresql/data

  api:
    build: ./api
    container_name: lupart-api
    ports:
      - "8001:8001"
    volumes:
      - ./api:/app
      - /app/node_modules
    environment:
      PORT: 8001
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USERNAME: postgres
      DB_PASSWORD: "1"
      DB_DATABASE: lupart
      JWT_SECRET: lupart-dev-secret-change-in-production
      JWT_EXPIRES_IN: 15m
      JWT_REFRESH_EXPIRES_IN: 7d
    depends_on:
      - postgres

  front:
    build: ./front
    container_name: lupart-front
    ports:
      - "5172:5172"
    volumes:
      - ./front:/app
      - /app/node_modules
    environment:
      VITE_PORT: 5172
      VITE_API_URL: http://localhost:8001/api
    depends_on:
      - api

volumes:
  lupart_pgdata:
